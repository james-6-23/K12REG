services:
  k12reg:
    build: .
    image: k12reg:latest
    container_name: k12reg
    restart: unless-stopped
    ports:
      - "8989:8000"
    environment:
      # ★ 修改为你自己的访问密码
      WEB_PASSWORD: "test8989"
      PORT: "8000"
      K12_DATA_DIR: "/data"
    volumes:
      # Docker 会自动创建宿主机 ./data（无需手动 mkdir）
      # 容器启动时会自动生成 hotmail.txt / proxies.txt / hotsession.json 等模板
      - ./data:/data
